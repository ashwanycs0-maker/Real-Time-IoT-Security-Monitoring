<!DOCTYPE html>
<html>
<head>
<title>Login | IoT Security Analyzer</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg, #020617, #0f172a);
    color:white;
}

/* 🔥 Glass Card */
.box{
    background: rgba(17, 24, 39, 0.8);
    backdrop-filter: blur(10px);
    padding:35px;
    border-radius:15px;
    width:320px;
    box-shadow: 0 0 25px rgba(0,0,0,0.5);
    text-align:center;
}

/* Title */
.box h2{
    margin-bottom:20px;
    font-size:24px;
    letter-spacing:1px;
}

/* Inputs */
input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    background:#1e293b;
    color:white;
    outline:none;
    transition:0.3s;
}

input::placeholder{
    color:#94a3b8;
}

input:focus{
    background:#334155;
    box-shadow:0 0 5px #22c55e;
}

/* Button */
button{
    width:100%;
    padding:12px;
    margin-top:10px;
    background: linear-gradient(135deg, #22c55e, #16a34a);
    border:none;
    border-radius:8px;
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.03);
    box-shadow:0 0 10px #22c55e;
}

/* Error */
.error{
    margin-top:10px;
    color:#ef4444;
    font-size:14px;
}

/* Footer */
.footer{
    margin-top:15px;
    font-size:12px;
    color:#94a3b8;
}
</style>

</head>

<body>

<div class="box">
    <h2>🔐 IoT Security Login</h2>

    <form method="POST">
        <input name="username" placeholder="Enter Username" required>
        <input name="password" type="password" placeholder="Enter Password" required>
        <button type="submit">Login</button>
    </form>

    {% if error %}
    <p class="error">{{ error }}</p>
    {% endif %}

    <div class="footer">
        Secure Access Panel
    </div>
</div>

</body>
</html>
